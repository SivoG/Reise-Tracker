<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reise Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070c15;--surface:#0d1525;--elevated:#131f35;--border:#1d2d4a;
  --accent:#e63946;--accent-glow:rgba(230,57,70,.35);--text:#dde3f0;--muted:#5c6f8a;
}
body{background:var(--bg);color:var(--text);font-family:'Karla',sans-serif;min-height:100vh;overflow-x:hidden}
 
header{text-align:center;padding:2.5rem 1rem .75rem;position:relative;z-index:10}
header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:600px;height:200px;pointer-events:none;
  background:radial-gradient(ellipse at top,rgba(68,120,230,.12) 0%,transparent 70%)}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4rem);letter-spacing:.25em;
  background:linear-gradient(135deg,#fff 0%,#aabfe8 50%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:var(--muted);font-size:.9rem;letter-spacing:.08em;margin-top:.3rem}
 
.search-wrapper{max-width:620px;margin:1.75rem auto 0;padding:0 1rem;position:relative;z-index:100}
.search-row{display:flex;gap:.6rem}
#searchInput{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:.75rem 1.2rem;border-radius:10px;font-family:inherit;font-size:.95rem;outline:none;
  transition:border-color .2s,box-shadow .2s}
#searchInput::placeholder{color:var(--muted)}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#addBtn{background:var(--accent);color:#fff;border:none;padding:.75rem 1.4rem;border-radius:10px;
  font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;white-space:nowrap;
  letter-spacing:.03em;transition:filter .2s,transform .1s,box-shadow .2s}
#addBtn:hover{filter:brightness(1.15);box-shadow:0 4px 18px var(--accent-glow);transform:translateY(-1px)}
#addBtn:active{transform:translateY(0);filter:brightness(.95)}
#addBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#suggestions{position:absolute;top:calc(100% + 4px);left:1rem;right:calc(1rem + 142px);
  background:var(--elevated);border:1px solid var(--border);border-radius:0 0 10px 10px;
  z-index:200;overflow:hidden;display:none;box-shadow:0 12px 30px rgba(0,0,0,.5)}
.sug-item{padding:.65rem 1.2rem;font-size:.875rem;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .15s;color:var(--text);line-height:1.4}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:var(--border);color:#fff}
 
/* MAP */
#mapWrap{
  position:relative;
  width:100%;
  height:60vh;
  min-height:320px;
  max-height:580px;
  margin-top:.75rem;
  background:#0a0e1a;
  overflow:hidden;
}
/* NO CSS filter on this canvas – tiles are already dark */
#mapCanvas{
  position:absolute;
  inset:0;
  display:block;
  /* size via JS for HiDPI */
  cursor:grab;
}
#mapCanvas:active{cursor:grabbing}
 
/* Pin overlay – separate canvas, always on top */
#pinCanvas{
  position:absolute;
  inset:0;
  pointer-events:none;
}
 
/* HUD */
#hud{
  position:absolute;bottom:.7rem;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:.6rem;pointer-events:none;z-index:20;
  background:rgba(7,12,21,.85);border:1px solid var(--border);
  padding:.3rem 1rem;border-radius:20px;backdrop-filter:blur(6px);
  font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:.07em;white-space:nowrap;
}
#hudZ{color:#fff}
 
/* +/- buttons */
#zbWrap{position:absolute;right:.8rem;bottom:3rem;z-index:20;display:flex;flex-direction:column;gap:3px}
.zb{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:rgba(13,21,37,.92);border:1px solid var(--border);color:var(--text);
  font-size:1.2rem;font-weight:700;cursor:pointer;border-radius:8px;
  transition:border-color .15s,background .15s;line-height:1;user-select:none}
.zb:hover{border-color:var(--accent);background:rgba(230,57,70,.15)}
 
.attr{position:absolute;bottom:.35rem;right:.8rem;font-size:.6rem;
  color:rgba(255,255,255,.2);pointer-events:none;z-index:5}
 
/* LOCATIONS */
.locations-section{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem}
.section-header{display:flex;align-items:baseline;gap:.75rem;margin-bottom:1.25rem;
  padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.section-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.18em;color:var(--muted)}
#countBadge{background:var(--surface);border:1px solid var(--border);color:var(--muted);
  font-size:.75rem;font-weight:700;padding:.15rem .55rem;border-radius:20px}
.empty-state{color:var(--muted);font-size:.9rem;text-align:center;padding:3rem 0}
 
/* ── Country group ────────── */
.country-group{margin-bottom:.65rem;border-radius:14px;overflow:hidden;
  border:1px solid var(--border);background:var(--surface)}
 
.country-header{
  display:flex;align-items:center;gap:.65rem;padding:.85rem 1.1rem;
  cursor:pointer;user-select:none;
  transition:background .18s;
}
.country-header:hover{background:var(--elevated)}
 
.country-flag{font-size:1.15rem;line-height:1;flex-shrink:0}
.country-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.12em;
  color:#fff;flex:1}
.country-count{font-size:.68rem;font-weight:700;letter-spacing:.06em;
  background:rgba(255,255,255,.07);color:var(--muted);
  padding:.12rem .5rem;border-radius:20px;margin-right:.2rem}
.country-chevron{color:var(--muted);font-size:.75rem;transition:transform .25s;flex-shrink:0}
.country-group.open .country-chevron{transform:rotate(180deg)}
 
/* ── Places inside country ─── */
.country-places{max-height:0;overflow:hidden;transition:max-height .32s ease}
.country-group.open .country-places{max-height:4000px}
 
.place-item{
  border-top:1px solid var(--border);
  padding:.85rem 1.1rem .85rem 1.3rem;
  transition:background .18s;
}
.place-item:hover{background:rgba(255,255,255,.02)}
 
.place-header{display:flex;align-items:center;gap:.55rem;margin-bottom:.6rem}
 
.pin-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pin-dot.city{background:#e63946;box-shadow:0 0 7px rgba(230,57,70,.6)}
.pin-dot.place{background:#ffd000;box-shadow:0 0 7px rgba(255,208,0,.5)}
 
.place-name{font-weight:700;font-size:.9rem;flex:1;color:#fff;line-height:1.3}
 
.fly-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:.68rem;
  font-weight:700;letter-spacing:.07em;padding:.18rem .5rem;border-radius:6px;cursor:pointer;
  transition:border-color .2s,color .2s,background .2s;margin-right:.2rem;white-space:nowrap}
.fly-btn:hover{border-color:#ffd000;color:#ffd000;background:rgba(255,208,0,.06)}
.remove-btn{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;
  line-height:1;padding:0 .1rem;transition:color .2s}
.remove-btn:hover{color:var(--accent)}
 
.note-label{font-size:.68rem;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.3rem}
.note-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:.5rem .8rem;border-radius:8px;font-family:inherit;font-size:.85rem;resize:vertical;
  min-height:58px;outline:none;transition:border-color .2s,box-shadow .2s;line-height:1.5}
.note-input::placeholder{color:var(--muted)}
.note-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
 
#modal{display:none;position:fixed;inset:0;background:rgba(4,8,18,.75);
  backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center}
#modal.open{display:flex}
.modal-box{background:var(--elevated);border:1px solid rgba(230,57,70,.5);border-radius:14px;
  padding:1.6rem 1.8rem;min-width:280px;max-width:min(480px,90vw);
  box-shadow:0 0 60px var(--accent-glow),0 20px 50px rgba(0,0,0,.6);animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1rem}
.modal-pin{width:12px;height:12px;background:#ffd000;border-radius:50%;flex-shrink:0;
  margin-top:4px;box-shadow:0 0 10px rgba(255,208,0,.5)}
.modal-title-text{font-weight:700;font-size:1rem;color:#fff;flex:1;line-height:1.4}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;
  line-height:1;flex-shrink:0;transition:color .2s;padding:0}
.modal-close:hover{color:#fff}
.modal-note-label{font-size:.72rem;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.4rem}
.modal-note-text{color:var(--text);font-size:.9rem;line-height:1.6;white-space:pre-wrap;min-height:40px}
.modal-note-text.empty{color:var(--muted);font-style:italic}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--elevated);border:1px solid var(--border);color:var(--text);
  padding:.65rem 1.4rem;border-radius:50px;font-size:.875rem;opacity:0;pointer-events:none;
  transition:all .3s ease;z-index:2000;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
 
<header>
  <h1>Reise Tracker</h1>
  <p class="subtitle">Deine bereisten Orte auf einem Blick</p>
</header>
 
<div class="search-wrapper">
  <div class="search-row">
    <input id="searchInput" type="text" placeholder="Ort oder Land suchen…" autocomplete="off" spellcheck="false"/>
    <button id="addBtn">Ort hinzufügen</button>
  </div>
  <div id="suggestions"></div>
</div>
 
<div id="mapWrap">
  <canvas id="mapCanvas"></canvas>
  <canvas id="pinCanvas"></canvas>
  <div id="hud"><span id="hudZ">2</span>&nbsp;·&nbsp;Scrollen = Zoom &nbsp;|&nbsp; Ziehen = Bewegen</div>
  <div id="zbWrap"><button class="zb" id="zIn">+</button><button class="zb" id="zOut">−</button></div>
  <div class="attr">© CARTO · © OpenStreetMap</div>
</div>
 
<div class="locations-section">
  <div class="section-header">
    <h2>Meine Orte</h2>
    <span id="countBadge">0</span>
  </div>
  <div id="locationsList"><p class="empty-state">Noch keine Orte hinzugefügt</p></div>
</div>
 
<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-pin"></div>
      <span class="modal-title-text" id="modalTitle"></span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-note-label">Notiz</div>
    <div class="modal-note-text" id="modalNote"></div>
  </div>
</div>
<div id="toast"></div>
 
<script>
'use strict';
 
/* ─── State ─────────────────────────────────────── */
const locations   = [];
let   activeSuggest = null;
 
/* ─── Canvas & HiDPI setup ──────────────────────── */
const wrap      = document.getElementById('mapWrap');
const mc        = document.getElementById('mapCanvas');   // tiles
const pc        = document.getElementById('pinCanvas');   // pins (no filter)
const mCtx      = mc.getContext('2d');
const pCtx      = pc.getContext('2d');
const DPR       = Math.min(window.devicePixelRatio || 1, 2);
 
function sizeCanvases() {
  const W = wrap.offsetWidth  || 800;
  const H = wrap.offsetHeight || 420;
  // Physical pixels = CSS pixels × DPR for crisp rendering
  mc.width  = W * DPR; mc.height = H * DPR;
  mc.style.width  = W + 'px'; mc.style.height = H + 'px';
  pc.width  = W * DPR; pc.height = H * DPR;
  pc.style.cssText = `position:absolute;inset:0;width:${W}px;height:${H}px;pointer-events:none;z-index:5`;
  mCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  pCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
sizeCanvases();
 
/* ─── Map view ──────────────────────────────────── */
let zoom = 2;
let cx   = 2.0;    // center of world at zoom 2 (world = 4 tiles wide, center = 2.0)
let cy   = 1.4;
const TS = 256;
 
/* Clamp so world shows exactly once, no repeating edges */
function clampView() {
  const W  = wrap.offsetWidth  || 800;
  const H  = wrap.offsetHeight || 420;
  const n  = 1 << zoom;
  // Horizontal
  if (n * TS <= W) { cx = n / 2; }
  else { cx = Math.max(W / 2 / TS, Math.min(n - W / 2 / TS, cx)); }
  // Vertical
  if (n * TS <= H) { cy = n / 2; }
  else { cy = Math.max(H / 2 / TS, Math.min(n - H / 2 / TS, cy)); }
}
 
/* ─── Tile cache ────────────────────────────────── */
const CACHE = {};
const TILE_PROVIDERS = [
  (z,x,y) => `https://${'abcd'[Math.abs(x+y)%4]}.basemaps.cartocdn.com/dark_matter/${z}/${x}/${y}@2x.png`,
  (z,x,y) => `https://${'abc'[Math.abs(x+y)%3]}.tile.openstreetmap.org/${z}/${x}/${y}.png`,
];
 
function getTile(z, tx, ty) {
  const n = 1 << z;
  // No wrapping – tiles outside world bounds return null (shown as dark background)
  if (tx < 0 || tx >= n || ty < 0 || ty >= n) return null;
 
  const key = `${z}/${tx}/${ty}`;
  if (CACHE[key] instanceof HTMLImageElement) return CACHE[key];
  if (CACHE[key]) return null;   // loading or failed
 
  CACHE[key] = 'loading';
 
  function tryProvider(idx) {
    if (idx >= TILE_PROVIDERS.length) { CACHE[key] = 'failed'; return; }
    const img = new Image();
    // @2x CARTO tiles are 512px but represent 256px of map → drawn at TS × TS = correct
    img.crossOrigin = 'anonymous';
    img.onload  = () => { CACHE[key] = img; render(); };
    img.onerror = () => tryProvider(idx + 1);
    img.src = TILE_PROVIDERS[idx](z, tx, ty);
  }
  tryProvider(0);
  return null;
}
 
/* ─── Main render ───────────────────────────────── */
function render() {
  const W = wrap.offsetWidth  || 800;
  const H = wrap.offsetHeight || 420;
 
  mCtx.fillStyle = '#0a0e1a';
  mCtx.fillRect(0, 0, W, H);
 
  const n = 1 << zoom;
  const originX = W / 2 - cx * TS;
  const originY = H / 2 - cy * TS;
 
  // Dark fill for areas outside the world (before drawing tiles)
  mCtx.fillStyle = '#050810';
  // Left of world
  if (originX > 0) mCtx.fillRect(0, 0, originX, H);
  // Right of world
  const worldRight = originX + n * TS;
  if (worldRight < W) mCtx.fillRect(worldRight, 0, W - worldRight, H);
  // Top of world
  if (originY > 0) mCtx.fillRect(0, 0, W, originY);
  // Bottom of world
  const worldBottom = originY + n * TS;
  if (worldBottom < H) mCtx.fillRect(0, worldBottom, W, H - worldBottom);
 
  const x0 = Math.floor(-originX / TS) - 1;
  const y0 = Math.floor(-originY / TS) - 1;
  const x1 = Math.ceil((W - originX) / TS) + 1;
  const y1 = Math.ceil((H - originY) / TS) + 1;
 
  for (let tx = x0; tx <= x1; tx++) {
    for (let ty = y0; ty <= y1; ty++) {
      // Skip tiles outside world bounds – they're already covered by dark fill
      if (tx < 0 || tx >= n || ty < 0 || ty >= n) continue;
      const px = Math.round(originX + tx * TS);
      const py = Math.round(originY + ty * TS);
      const img = getTile(zoom, tx, ty);
      if (img) {
        mCtx.drawImage(img, px, py, TS, TS);
      } else {
        mCtx.fillStyle = '#0d1525';
        mCtx.fillRect(px + 1, py + 1, TS - 2, TS - 2);
      }
    }
  }
 
  // Pins on separate canvas (so they are unaffected by any future styling)
  renderPins(originX, originY, W, H);
 
  document.getElementById('hudZ').textContent = 'Zoom ' + zoom;
}
 
function renderPins(originX, originY, W, H) {
  pCtx.clearRect(0, 0, W, H);
  locations.forEach(loc => {
    const p  = ll2t(loc.lat, loc.lon, zoom);
    const px = originX + p.x * TS;
    const py = originY + p.y * TS;
    if (px < -20 || py < -20 || px > W + 20 || py > H + 20) return;
 
    const pinColor  = loc.isCountry ? '#e63946' : '#ffd000';
    const glowColor = loc.isCountry ? 'rgba(230,57,70,.28)' : 'rgba(255,208,0,.22)';
    const rimColor  = loc.isCountry ? 'rgba(160,30,40,.9)' : 'rgba(120,75,0,.9)';
 
    // Outer glow
    pCtx.beginPath();
    pCtx.arc(px, py, 10, 0, Math.PI * 2);
    pCtx.fillStyle = glowColor;
    pCtx.fill();
 
    // Pin dot
    pCtx.beginPath();
    pCtx.arc(px, py, 5.5, 0, Math.PI * 2);
    pCtx.fillStyle   = pinColor;
    pCtx.strokeStyle = rimColor;
    pCtx.lineWidth   = 1.5;
    pCtx.fill();
    pCtx.stroke();
 
    // Label
    const label = loc.shortName || loc.name.split(',')[0];
    pCtx.font         = 'bold 12px Karla,sans-serif';
    pCtx.lineWidth    = 3.5;
    pCtx.strokeStyle  = 'rgba(0,0,0,.85)';
    pCtx.fillStyle    = '#fff';
    pCtx.strokeText(label, px + 9, py + 4);
    pCtx.fillText   (label, px + 9, py + 4);
  });
}
 
/* ─── Projection helpers ────────────────────────── */
function ll2t(lat, lon, z) {
  const n = 1 << z;
  const x = (lon + 180) / 360 * n;
  const r = lat * Math.PI / 180;
  const y = (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * n;
  return { x, y };
}
 
/* ─── Zoom ──────────────────────────────────────── */
function setZoom(nz, pivotX, pivotY) {
  nz = Math.max(1, Math.min(18, nz));
  if (nz === zoom) return;
  const W = wrap.offsetWidth || 800;
  const H = wrap.offsetHeight || 420;
  const px = pivotX ?? W / 2;
  const py = pivotY ?? H / 2;
  const tileMouseX = cx + (px - W / 2) / TS;
  const tileMouseY = cy + (py - H / 2) / TS;
  const s = Math.pow(2, nz - zoom);
  zoom = nz;
  cx = tileMouseX * s - (px - W / 2) / TS;
  cy = tileMouseY * s - (py - H / 2) / TS;
  clampView();
  render();
}
 
/* ─── Drag / scroll ─────────────────────────────── */
let drag = null;
mc.addEventListener('wheel', e => {
  e.preventDefault();
  const r = mc.getBoundingClientRect();
  setZoom(zoom + (e.deltaY < 0 ? 1 : -1),
    (e.clientX - r.left),
    (e.clientY - r.top));
}, { passive: false });
 
mc.addEventListener('mousedown', e => {
  drag = { sx: e.clientX, sy: e.clientY, cx, cy, moved: false };
  mc.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx = (e.clientX - drag.sx) / TS;
  const dy = (e.clientY - drag.sy) / TS;
  if (Math.hypot(dx, dy) > .004) drag.moved = true;
  cx = drag.cx - dx; cy = drag.cy - dy;
  clampView();
  render();
});
window.addEventListener('mouseup', () => { drag = null; mc.style.cursor = 'grab'; });
 
mc.addEventListener('click', e => {
  if (drag?.moved) return;
  const r  = mc.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  const W  = wrap.offsetWidth || 800;
  const H  = wrap.offsetHeight || 420;
  const ox = W / 2 - cx * TS;
  const oy = H / 2 - cy * TS;
  for (const loc of locations) {
    const p  = ll2t(loc.lat, loc.lon, zoom);
    if (Math.hypot(mx - (ox + p.x * TS), my - (oy + p.y * TS)) < 14) { openModal(loc); return; }
  }
});
 
/* Touch */
let t0 = null, pinch0 = null;
mc.addEventListener('touchstart', e => {
  if (e.touches.length === 1) t0 = { sx: e.touches[0].clientX, sy: e.touches[0].clientY, cx, cy, moved: false };
  if (e.touches.length === 2) pinch0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
}, { passive: true });
mc.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && t0) {
    const dx = (e.touches[0].clientX - t0.sx) / TS, dy = (e.touches[0].clientY - t0.sy) / TS;
    if (Math.hypot(dx, dy) > .004) t0.moved = true;
    cx = t0.cx - dx; cy = t0.cy - dy; clampView(); render();
  } else if (e.touches.length === 2 && pinch0) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (d / pinch0 > 1.15) { setZoom(zoom + 1); pinch0 = d; }
    if (d / pinch0 < .87)  { setZoom(zoom - 1); pinch0 = d; }
  }
}, { passive: false });
mc.addEventListener('touchend', () => { t0 = null; pinch0 = null; });
 
document.getElementById('zIn' ).addEventListener('click', () => setZoom(zoom + 1));
document.getElementById('zOut').addEventListener('click', () => setZoom(zoom - 1));
 
window.addEventListener('resize', () => { sizeCanvases(); render(); });
 
function flyTo(lat, lon, z) {
  const p = ll2t(lat, lon, z);
  zoom = z; cx = p.x; cy = p.y;
  clampView();
  render();
}
 
/* ─── Initial render ────────────────────────────── */
clampView();
render();
loadLocations();
 
/* ─── Nominatim ─────────────────────────────────── */
const searchInput = document.getElementById('searchInput');
const suggDiv     = document.getElementById('suggestions');
let   searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer); activeSuggest = null;
  const q = searchInput.value.trim();
  if (q.length < 2) { hideSugg(); return; }
  searchTimer = setTimeout(() => loadSugg(q), 320);
});
async function loadSugg(q) {
  try { renderSugg(await (await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=de&addressdetails=1`)).json()); }
  catch(_) { hideSugg(); }
}
function renderSugg(res) {
  if (!res.length) { hideSugg(); return; }
  suggDiv.innerHTML = ''; suggDiv.style.display = 'block';
  res.forEach(r => {
    const el = document.createElement('div'); el.className = 'sug-item'; el.textContent = r.display_name;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      searchInput.value = r.display_name;
      // Store full raw Nominatim result so handleAdd can use it directly
      activeSuggest = r;
      activeSuggest.name = r.display_name;
      hideSugg();
    });
    suggDiv.appendChild(el);
  });
}
function hideSugg() { suggDiv.style.display = 'none'; suggDiv.innerHTML = ''; }
document.addEventListener('click', e => { if (!e.target.closest('.search-wrapper')) hideSugg(); });
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); handleAdd(); } });
 
/* ─── Persistence (localStorage) ───────────────── */
const STORAGE_KEY = 'reise-tracker-v1';
 
// Must be declared before loadLocations uses it
const expandedGroups = new Set();
 
function saveLocations() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(locations));
  } catch(e) { console.warn('localStorage save failed:', e); }
}
 
function loadLocations() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!Array.isArray(saved)) return;
    saved.forEach(loc => {
      locations.push(loc);
      if (loc.country) expandedGroups.add(loc.country);
    });
    renderList();
    render();
  } catch(e) { console.warn('localStorage load failed:', e); }
}
 
/* ─── Add location ──────────────────────────────── */
document.getElementById('addBtn').addEventListener('click', handleAdd);
 
async function handleAdd() {
  const name = searchInput.value.trim(); if (!name) return;
  const btn = document.getElementById('addBtn'); btn.disabled = true;
 
  let raw = (activeSuggest?.name === name) ? activeSuggest : null;
 
  if (!raw) {
    try {
      // addressdetails=1 gives us country, city, etc.
      const d = await (await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1&accept-language=de&addressdetails=1`
      )).json();
      if (!d.length) { showToast('Ort nicht gefunden.'); btn.disabled = false; return; }
      raw = d[0];
    } catch(_) { showToast('Fehler.'); btn.disabled = false; return; }
  }
  const addr      = raw.address || {};
  const country   = addr.country   || '';
  const shortName = addr.city || addr.town || addr.village || addr.hamlet ||
                    addr.municipality || addr.county || addr.state ||
                    raw.display_name.split(',')[0].trim();
  const isCity    = raw.class === 'place' &&
                    ['city','town','village','hamlet','municipality'].includes(raw.type);
 
  // Red pin = only when the entry is a whole country
  const isCountry = raw.type === 'country' ||
                    raw.addresstype === 'country' ||
                    (raw.class === 'boundary' && parseInt(raw.address_rank) <= 4);
 
  const loc = {
    name:      raw.display_name,
    shortName: shortName,
    country:   country,
    lat:       +raw.lat,
    lon:       +raw.lon,
    isCity:    isCity,
    isCountry: isCountry,
    note:      '',
  };
 
  if (locations.some(l => l.name === loc.name)) { showToast('Bereits in der Liste.'); btn.disabled = false; return; }
 
  locations.push(loc);
  saveLocations();
 
  // Auto-expand the country group this place belongs to
  if (loc.country) expandedGroups.add(loc.country);
 
  render();
  renderList();
  flyTo(loc.lat, loc.lon, isCity ? Math.max(zoom, 7) : Math.max(zoom, 10));
  searchInput.value = ''; activeSuggest = null; hideSugg(); btn.disabled = false;
  showToast(`📍 ${shortName} hinzugefügt`);
}
 
/* ─── Grouped list ──────────────────────────────── */
function renderList() {
  const list = document.getElementById('locationsList');
  document.getElementById('countBadge').textContent = locations.length;
 
  if (!locations.length) {
    list.innerHTML = '<p class="empty-state">Noch keine Orte hinzugefügt</p>';
    return;
  }
 
  // Group by country; ungrouped = no country info
  const groups  = {};   // countryName → [loc, ...]
  const ungrouped = []; // locs without country
 
  locations.forEach(loc => {
    if (loc.country) {
      (groups[loc.country] = groups[loc.country] || []).push(loc);
    } else {
      ungrouped.push(loc);
    }
  });
 
  list.innerHTML = '';
 
  // ── Render each country group ──
  Object.entries(groups).forEach(([country, locs]) => {
    const isOpen = expandedGroups.has(country);
    const group  = document.createElement('div');
    group.className = 'country-group' + (isOpen ? ' open' : '');
 
    const flag = countryFlag(locs[0]);
 
    group.innerHTML = `
      <div class="country-header">
        <span class="country-flag">${flag}</span>
        <span class="country-name">${esc(country)}</span>
        <span class="country-count">${locs.length} ${locs.length === 1 ? 'Ort' : 'Orte'}</span>
        <span class="country-chevron">▼</span>
      </div>
      <div class="country-places"></div>`;
 
    const header = group.querySelector('.country-header');
    const places = group.querySelector('.country-places');
 
    // Render place items inside
    locs.forEach(loc => {
      const idx  = locations.indexOf(loc);
      const item = buildPlaceItem(loc, idx);
      places.appendChild(item);
    });
 
    header.addEventListener('click', () => {
      const open = group.classList.toggle('open');
      if (open) expandedGroups.add(country);
      else       expandedGroups.delete(country);
    });
 
    list.appendChild(group);
  });
 
  // ── Render ungrouped locations ──
  if (ungrouped.length) {
    ungrouped.forEach(loc => {
      const idx  = locations.indexOf(loc);
      // Wrap in a single-item group-style card for visual consistency
      const item = buildPlaceItem(loc, idx);
      item.style.borderRadius = '14px';
      item.style.marginBottom = '.65rem';
      item.style.border       = '1px solid var(--border)';
      list.appendChild(item);
    });
  }
}
 
/* Build a single place row with note textarea */
function buildPlaceItem(loc, idx) {
  const item = document.createElement('div');
  item.className = 'place-item';
  item.innerHTML = `
    <div class="place-header">
      <span class="pin-dot ${loc.isCountry ? 'city' : 'place'}"></span>
      <span class="place-name">${esc(loc.shortName || loc.name.split(',')[0])}</span>
      <button class="fly-btn" data-i="${idx}">📍</button>
      <button class="remove-btn" data-i="${idx}">×</button>
    </div>
    <div class="note-label">Notiz</div>
    <textarea class="note-input" data-i="${idx}" placeholder="Erinnerungen, Tipps, Highlights…">${esc(loc.note)}</textarea>`;
 
  item.querySelector('.note-input').addEventListener('input', e => {
    locations[+e.target.dataset.i].note = e.target.value;
    saveLocations();
  });
  item.querySelector('.fly-btn').addEventListener('click', e => {
    e.stopPropagation();
    const l = locations[+e.target.dataset.i];
    flyTo(l.lat, l.lon, 11);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  item.querySelector('.remove-btn').addEventListener('click', e => {
    e.stopPropagation();
    const i = +e.target.dataset.i;
    const country = locations[i].country;
    if (country && locations.filter(l => l.country === country).length === 1) {
      expandedGroups.delete(country);
    }
    locations.splice(i, 1);
    saveLocations();
    render();
    renderList();
  });
  return item;
}
 
/* Derive flag emoji from country code */
function countryFlag(loc) {
  try {
    const cc = (loc.name.match(/,\s*([^,]+)$/) || [])[1];
    // Try to extract country code from display_name last segment
    // Fallback to globe emoji
    return '🌍';
  } catch { return '🌍'; }
}
 
/* ─── Modal ─────────────────────────────────────── */
const modal = document.getElementById('modal');
function openModal(loc) {
  document.getElementById('modalTitle').textContent = loc.shortName || loc.name.split(',')[0];
  const n = document.getElementById('modalNote');
  if (loc.note?.trim()) { n.textContent = loc.note; n.classList.remove('empty'); }
  else { n.textContent = 'Noch keine Notiz vorhanden.'; n.classList.add('empty'); }
  modal.classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });
 
/* ─── Toast ─────────────────────────────────────── */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
